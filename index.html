<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Justice McNeal LLC</title>
    <link rel="stylesheet" href="theme/Theme_JMLLC001/Theme_JMLLC001.css">
    <link rel="stylesheet" href="css/tailwind.Theme_JMLLC001.css">
    <link rel="stylesheet" href="css/pages/index.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13366e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JMLLC">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden relative font-body">

    <div class="splash-bg" aria-hidden="true"></div>

    <!-- Splash content -->
    <div id="splashContent" class="flex flex-col items-center text-center px-6 relative z-10">

        <!-- Logo -->
        <div class="splash-logo-wrap relative mb-8">
            <div class="logo-glow"></div>
            <div id="logoContainer" class="relative w-28 h-28 sm:w-36 sm:h-36 rounded-3xl bg-gradient-to-br from-primary-400 via-primary-500 to-primary-700 flex items-center justify-center shadow-2xl shadow-primary-200/50">
                <div id="logoSpinner" class="logo-spinner"></div>
                <span id="logoFallback" class="text-white font-bold text-4xl sm:text-5xl tracking-tight select-none hidden font-body">JM</span>
                <img id="logoImage" class="hidden absolute inset-0 w-full h-full object-contain rounded-3xl p-2" alt="Justice McNeal LLC" />
            </div>
        </div>

        <!-- Brand name -->
        <h1 class="brand-name font-headline text-3xl sm:text-4xl font-bold text-foreground tracking-headline leading-tight">
            Justice McNeal
            <span class="block text-primary">LLC</span>
        </h1>

        <!-- Tagline -->
        <p class="brand-tagline text-muted text-sm sm:text-base mt-3 max-w-xs">
            Building generational wealth, one contribution at a time
        </p>

        <!-- Progress indicator -->
        <div class="splash-progress mt-10 w-48">
            <div class="bg-primary-100 rounded-full overflow-hidden">
                <div id="progressBar" class="splash-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Shared globals + splash page module -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script type="module" src="js/pages/index/index.js"></script>
    <script src="js/sw-register.js"></script>
</body>
</html>
