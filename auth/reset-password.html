<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Set Password | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-brand-100 rounded-full opacity-60 blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-brand-50 rounded-full opacity-60 blur-3xl"></div>
    </div>

    <div class="w-full max-w-sm relative z-10 fade-in">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-brand-500 to-brand-700 rounded-2xl flex items-center justify-center shadow-lg shadow-brand-200">
                <span class="text-white font-extrabold text-xl">JM</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-gray-200/80 shadow-sm p-6 sm:p-8">
            <!-- Header -->
            <div class="text-center mb-6">
                <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">Set Your Password</h1>
                <p class="text-gray-500 text-sm mt-1">Create a password for your account</p>
            </div>

            <!-- Error State (if no token) -->
            <div id="errorState" class="hidden text-center py-4">
                <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
                <p class="text-base font-semibold text-gray-900 mb-1">Invalid or Expired Link</p>
                <p class="text-sm text-gray-500 mb-5">This password reset link is invalid or has expired.</p>
                <a href="login.html" class="inline-flex items-center gap-1 text-brand-600 hover:text-brand-700 font-medium text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Return to sign in
                </a>
            </div>

            <!-- Password Form -->
            <form id="passwordForm" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">New Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        minlength="6"
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm"
                    >
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required 
                        minlength="6"
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm"
                    >
                </div>

                <div id="formError" class="text-red-600 text-sm hidden"></div>
                <div id="formSuccess" class="text-emerald-600 text-sm hidden"></div>

                <button 
                    type="submit" 
                    id="submitBtn"
                    class="w-full bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold py-3 px-4 rounded-xl transition text-sm shadow-sm shadow-brand-200 flex items-center justify-center gap-2"
                >
                    <span>Set Password</span>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">&copy; 2026 Justice McNeal LLC &middot; Family Contribution Portal</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const passwordForm = document.getElementById('passwordForm');
            const errorState = document.getElementById('errorState');
            const formError = document.getElementById('formError');
            const formSuccess = document.getElementById('formSuccess');
            const submitBtn = document.getElementById('submitBtn');

            // Check for access_token in URL hash (Supabase redirects with hash)
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = hashParams.get('access_token');
            const type = hashParams.get('type');

            // Also check query params (some flows use these)
            const queryParams = new URLSearchParams(window.location.search);
            const token = queryParams.get('token');
            const tokenType = queryParams.get('type');

            // If we have an access_token in hash, Supabase has already processed the link
            // and we have a valid session
            if (accessToken) {
                // Session should be automatically set by Supabase
                console.log('Access token found, session should be active');
            } else if (!token && !accessToken) {
                // Check if there's an existing session from the recovery flow
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    // No valid token or session
                    passwordForm.classList.add('hidden');
                    errorState.classList.remove('hidden');
                    return;
                }
            }

            // Handle form submit
            passwordForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Hide previous messages
                formError.classList.add('hidden');
                formSuccess.classList.add('hidden');

                // Validate passwords match
                if (password !== confirmPassword) {
                    formError.textContent = 'Passwords do not match';
                    formError.classList.remove('hidden');
                    return;
                }

                // Validate password length
                if (password.length < 6) {
                    formError.textContent = 'Password must be at least 6 characters';
                    formError.classList.remove('hidden');
                    return;
                }

                // Disable button
                submitBtn.disabled = true;
                submitBtn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                `;

                try {
                    // Update the user's password
                    const { error } = await supabaseClient.auth.updateUser({
                        password: password
                    });

                    if (error) throw error;

                    // Mark setup as completed
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session) {
                        await supabaseClient
                            .from('profiles')
                            .update({ setup_completed: true })
                            .eq('id', session.user.id);
                    }

                    // Success!
                    formSuccess.textContent = 'Password set successfully! Redirecting...';
                    formSuccess.classList.remove('hidden');
                    passwordForm.querySelector('button').textContent = 'Success!';

                    // Redirect to portal after a moment
                    setTimeout(async () => {
                        // Check if user is admin
                        const { data: { session } } = await supabaseClient.auth.getSession();
                        if (session) {
                            const { data: profile } = await supabaseClient
                                .from('profiles')
                                .select('role')
                                .eq('id', session.user.id)
                                .single();

                            if (profile?.role === 'admin') {
                                window.location.href = '../admin/index.html';
                            } else {
                                window.location.href = '../portal/index.html';
                            }
                        } else {
                            window.location.href = 'login.html';
                        }
                    }, 1500);

                } catch (error) {
                    console.error('Error:', error);
                    formError.textContent = error.message || 'Failed to set password';
                    formError.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Set Password';
                }
            });
        });
    </script>
</body>
</html>
