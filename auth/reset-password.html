<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Set Password | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JMLLC">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
    <style>
        #lottie-bg {
            position: fixed; inset: 0; z-index: 0;
            overflow: hidden; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #lottie-bg dotlottie-player {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            height: 100vh; width: calc(100vh * 16 / 9); min-width: 100vw;
        }
        #lottie-bg dotlottie-player canvas,
        #lottie-bg dotlottie-player svg { width: 100% !important; height: 100% !important; }
    </style>
    <script type="module" src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"></script>
</head>
<body class="min-h-screen bg-brand-700 font-sans antialiased flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Lottie background -->
    <div id="lottie-bg" aria-hidden="true">
        <dotlottie-player
            src="https://assets-v2.lottiefiles.com/a/43a4e8e0-1189-11ee-91f3-3f220e198af4/vHkQOQT25m.lottie"
            autoplay loop>
        </dotlottie-player>
    </div>

    <div class="w-full max-w-sm relative z-10 fade-in">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-brand-500 to-brand-700 rounded-2xl flex items-center justify-center shadow-lg shadow-brand-200 overflow-hidden" data-brand-logo>
                <span class="text-white font-extrabold text-xl" data-brand-fallback>JM</span>
                <img class="w-full h-full object-contain hidden" alt="Logo" data-brand-img style="filter:brightness(0) invert(1)">
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-gray-200/80 shadow-sm p-6 sm:p-8">
            <!-- Header -->
            <div class="text-center mb-6">
                <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">Set Your Password</h1>
                <p class="text-gray-500 text-sm mt-1">Create a password for your account</p>
            </div>

            <!-- Error State (if no token) -->
            <div id="errorState" class="hidden text-center py-4">
                <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
                <p class="text-base font-semibold text-gray-900 mb-1">Invalid or Expired Link</p>
                <p class="text-sm text-gray-500 mb-5">This password reset link is invalid or has expired.</p>
                <a href="login.html" class="inline-flex items-center gap-1 text-brand-600 hover:text-brand-700 font-medium text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Return to sign in
                </a>
            </div>

            <!-- Password Form -->
            <form id="passwordForm" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">New Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        minlength="6"
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm"
                    >
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required 
                        minlength="6"
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm"
                    >
                </div>

                <div id="formError" class="text-red-600 text-sm hidden"></div>
                <div id="formSuccess" class="text-emerald-600 text-sm hidden"></div>

                <button 
                    type="submit" 
                    id="submitBtn"
                    class="w-full bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold py-3 px-4 rounded-xl transition text-sm shadow-sm shadow-brand-200 flex items-center justify-center gap-2"
                >
                    <span>Set Password</span>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-white/60 mt-6">&copy; 2026 Justice McNeal LLC &middot; Family Contribution Portal</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script>
    (function() {
        try {
            var cached = localStorage.getItem('brandLogoCache');
            if (!cached) return;
            var info = JSON.parse(cached);
            if (!info || !info.url) return;
            document.querySelectorAll('[data-brand-logo]').forEach(function(c) {
                var fb = c.querySelector('[data-brand-fallback]');
                var im = c.querySelector('[data-brand-img]');
                if (!im || im.src) return;
                im.src = info.url; im.classList.remove('hidden');
                if (fb) fb.classList.add('hidden');
                if (info.isTransparent) {
                    c.classList.remove('bg-gradient-to-br','from-brand-500','to-brand-700');
                    c.style.background = 'transparent'; c.style.boxShadow = 'none';
                }
            });
        } catch(e) {}
    })();
    document.addEventListener('DOMContentLoaded', function() { loadBrandLogos(); });
    </script>
    <script src="../js/auth/reset-password.js"></script>
    <script src="../js/sw-register.js"></script>
</body>
</html>
