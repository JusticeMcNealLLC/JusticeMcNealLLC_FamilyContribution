<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meet the Team | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
    <style>
        /* Hide top nav on mobile — Team page uses full-bleed sticky hero */
        @media (max-width: 767px) {
            body[data-active-page="team"] > nav { display: none !important; }
        }
    </style>
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar" data-page-type="portal" data-active-page="team">

    <div id="nav-placeholder"></div>

    <!-- Team hero: sticky full-bleed on mobile, card on desktop -->
    <div class="sticky top-0 z-30 md:static md:max-w-3xl md:mx-4 lg:mx-auto md:mt-6">
        <div class="bg-gradient-to-br from-brand-600 via-brand-600 to-brand-700 text-white relative overflow-hidden fade-in md:rounded-2xl"
             style="padding-top: max(1rem, env(safe-area-inset-top));">
            <!-- Orbs -->
            <div class="absolute top-0 right-0 w-40 h-40 bg-white/5 rounded-full -translate-y-12 translate-x-12 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-white/5 rounded-full translate-y-10 -translate-x-10 pointer-events-none"></div>

            <div class="relative px-5 sm:px-8 pb-5 sm:pb-6 flex items-center gap-4">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center flex-shrink-0">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <div>
                    <p class="text-white/70 text-xs font-semibold uppercase tracking-widest mb-0.5">Justice McNeal LLC</p>
                    <h1 class="text-xl sm:text-2xl font-extrabold text-white leading-tight">Meet the Team</h1>
                    <p class="text-white/60 text-xs sm:text-sm mt-0.5">Building generational wealth together.</p>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-4 sm:py-8 flex-1 w-full">

        <!-- Leadership Section -->
        <div class="mb-8">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 px-1">Leadership</h2>
            <div id="leadershipGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Rendered by JS -->
                <div class="flex items-center gap-4 p-4 bg-white rounded-2xl border border-gray-100 shadow-sm animate-pulse">
                    <div class="w-16 h-16 rounded-full bg-gray-200"></div>
                    <div class="flex-1 space-y-2"><div class="h-4 w-28 bg-gray-200 rounded"></div><div class="h-3 w-20 bg-gray-100 rounded"></div></div>
                </div>
            </div>
        </div>

        <!-- Org Chart Section -->
        <div class="mb-8">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 px-1">Organization Structure</h2>
            <div id="orgChart" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 sm:p-6">
                <!-- Rendered by JS -->
            </div>
        </div>

        <!-- Role Definitions -->
        <div class="mb-8">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 px-1">Role Definitions</h2>
            <div class="space-y-3" id="roleDefinitions">
                <!-- Rendered by JS -->
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>
    <div id="tabs-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell/icons.js"></script>
    <script src="../js/components/pageShell/helpers.js"></script>
    <script src="../js/components/pageShell/nav.js"></script>
    <script src="../js/components/pageShell/dropdowns.js"></script>
    <script src="../js/components/pageShell/drawer.js"></script>
    <script src="../js/components/pageShell/profile-loader.js"></script>
    <script src="../js/components/pageShell/index.js"></script>
    <script src="../js/components/notifications.js"></script>
    <script src="../js/push.js"></script>
    <script src="../js/auth/shared.js"></script>
    <script src="../js/portal/quests/config.js"></script>
    <script src="../js/portal/team.js"></script>
    <script src="../js/sw-register.js"></script>
</body>
</html>
