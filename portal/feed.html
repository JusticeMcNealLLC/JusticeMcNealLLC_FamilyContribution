<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Family Feed | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar" data-page-type="portal" data-active-page="feed">

    <div id="nav-placeholder"></div>

    <main class="max-w-xl mx-auto px-0 sm:px-4 lg:px-8 py-0 sm:py-4 flex-1 w-full">

        <!-- Feed Filter Tabs -->
        <div class="px-4 sm:px-0 mb-3 sm:mb-4">
            <div class="flex gap-2 overflow-x-auto no-scrollbar">
                <button class="feed-filter-pill active" data-filter="all">All</button>
                <button class="feed-filter-pill" data-filter="announcement">📢 Announcements</button>
                <button class="feed-filter-pill" data-filter="milestone">🎉 Milestones</button>
                <button class="feed-filter-pill" data-filter="member">👤 Members</button>
                <button class="feed-filter-pill" data-filter="bookmarked">🔖 Saved</button>
            </div>
        </div>

        <!-- New Posts Indicator (hidden by default) -->
        <div id="newPostsIndicator" class="hidden px-4 sm:px-0 mb-3">
            <button class="w-full bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold py-2.5 rounded-full transition shadow-md shadow-brand-300/30 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                <span id="newPostsCount">New posts</span>
            </button>
        </div>

        <!-- Feed Container -->
        <div id="feedContainer" class="space-y-0 sm:space-y-4">
            <!-- Posts will be rendered here -->
            <div id="feedLoading" class="py-12 text-center">
                <div class="inline-flex items-center gap-2 text-gray-400">
                    <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                    <span class="text-sm">Loading feed...</span>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="feedEmpty" class="hidden py-16 text-center px-4">
            <div class="w-20 h-20 bg-brand-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">No posts yet</h3>
            <p class="text-sm text-gray-500 mb-6 max-w-xs mx-auto">Be the first to share something with the family!</p>
            <button id="emptyStatePostBtn" class="inline-flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 px-5 rounded-xl transition text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Create Post
            </button>
        </div>

        <!-- Infinite Scroll Trigger -->
        <div id="scrollTrigger" class="py-8 text-center hidden">
            <div class="inline-flex items-center gap-2 text-gray-400">
                <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                <span class="text-sm">Loading more...</span>
            </div>
        </div>

    </main>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- Post Composer Modal (Full-screen on mobile) -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="composerModal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="composerBackdrop"></div>
        <div class="relative flex items-end sm:items-center justify-center min-h-full">
            <div id="composerPanel" class="bg-white w-full sm:max-w-lg sm:rounded-2xl sm:mx-4 sm:my-8 max-h-[92vh] sm:max-h-[80vh] flex flex-col rounded-t-2xl sm:rounded-b-2xl shadow-2xl overflow-hidden slide-up">
                
                <!-- Composer Header -->
                <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
                    <button id="composerCloseBtn" class="text-sm font-medium text-gray-500 hover:text-gray-700 transition">Cancel</button>
                    <h3 class="font-bold text-gray-900 text-sm">Create Post</h3>
                    <button id="composerSubmitBtn" class="bg-brand-600 hover:bg-brand-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold text-sm py-1.5 px-4 rounded-full transition" disabled>Post</button>
                </div>

                <!-- Composer Body -->
                <div class="flex-1 overflow-y-auto p-4">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-full bg-brand-100 flex items-center justify-center overflow-hidden flex-shrink-0 border border-gray-200">
                            <span id="modalComposerInitials" class="text-brand-600 text-sm font-bold"></span>
                            <img id="modalComposerAvatar" class="w-full h-full object-cover hidden" alt="">
                        </div>
                        <div class="flex-1">
                            <p class="text-sm font-semibold text-gray-900" id="modalComposerName">You</p>
                            <select id="postVisibility" class="text-xs text-gray-500 bg-gray-100 rounded-full px-2 py-0.5 mt-0.5 border-0 focus:ring-2 focus:ring-brand-300">
                                <option value="family">🌐 Family</option>
                                <option value="private">🔒 Only Me</option>
                            </select>
                        </div>
                    </div>
                    <textarea id="postContent" class="w-full mt-3 text-gray-900 placeholder-gray-400 text-sm border-0 resize-none focus:ring-0 focus:outline-none min-h-[120px]" placeholder="What's happening in the family?" maxlength="2000"></textarea>
                    
                    <!-- Image Preview Area -->
                    <div id="imagePreviewArea" class="hidden mt-3">
                        <div id="imagePreviewGrid" class="grid gap-2"></div>
                    </div>

                    <!-- Character Count -->
                    <div class="flex items-center justify-between mt-2">
                        <span id="charCount" class="text-xs text-gray-400">0 / 2000</span>
                    </div>
                </div>

                <!-- Composer Footer Actions -->
                <div class="border-t border-gray-100 px-4 py-3 flex items-center gap-3">
                    <label class="cursor-pointer flex items-center gap-1.5 text-gray-500 hover:text-emerald-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <input type="file" id="postImageInput" accept="image/*" multiple class="hidden" max="4">
                    </label>
                    <label class="cursor-pointer flex items-center gap-1.5 text-gray-500 hover:text-red-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        <input type="file" id="postVideoInput" accept="video/mp4,video/quicktime" class="hidden">
                    </label>
                    <div class="flex-1"></div>
                    <div id="composerAdminToggle" class="hidden">
                        <label class="flex items-center gap-2 text-xs text-amber-700 font-medium cursor-pointer">
                            <input type="checkbox" id="isPinnedCheck" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                            📌 Pin to top
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- Comments Bottom Sheet (Instagram-style) -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="postDetailModal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true">
        <div class="absolute inset-0 bg-black/40" id="detailBackdrop"></div>
        <div class="relative flex items-end justify-center min-h-full">
            <div id="detailPanel" class="bg-white w-full sm:max-w-lg sm:mx-4 sm:mb-8 sm:rounded-2xl max-h-[75vh] flex flex-col rounded-t-2xl shadow-2xl overflow-hidden slide-up">
                <!-- Drag handle -->
                <div class="flex items-center justify-center py-2 flex-shrink-0">
                    <div class="w-10 h-1 bg-gray-300 rounded-full"></div>
                </div>
                <div class="flex items-center justify-between px-4 pb-2 border-b border-gray-100 flex-shrink-0">
                    <h3 class="font-bold text-gray-900 text-sm">Comments</h3>
                    <button id="detailCloseBtn" class="p-1 hover:bg-gray-100 rounded-lg transition">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div id="detailContent" class="flex-1 overflow-y-auto px-4 py-3">
                    <!-- Comments rendered here by JS -->
                </div>
                <!-- Comment Input -->
                <div class="border-t border-gray-100 px-4 py-3 flex items-center gap-3 flex-shrink-0">
                    <div class="w-8 h-8 rounded-full bg-brand-100 flex items-center justify-center overflow-hidden flex-shrink-0">
                        <span id="commentInitials" class="text-brand-600 text-xs font-bold"></span>
                        <img id="commentAvatar" class="w-full h-full object-cover hidden" alt="">
                    </div>
                    <input type="text" id="commentInput" class="flex-1 bg-surface-100 rounded-full px-4 py-2 text-sm border-0 focus:ring-2 focus:ring-brand-300 focus:bg-white transition placeholder-gray-400" placeholder="Add a comment..." maxlength="500">
                    <button id="commentSendBtn" class="p-2 text-brand-600 hover:bg-brand-50 rounded-full transition disabled:text-gray-300 disabled:hover:bg-transparent" disabled>
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <div id="tabs-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell.js"></script>
    <script src="../js/auth/shared.js"></script>
    <script src="../js/portal/quests/config.js"></script>
    <script src="../js/portal/feed.js"></script>
</body>
</html>
