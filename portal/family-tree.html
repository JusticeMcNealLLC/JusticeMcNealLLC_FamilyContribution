<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Family Tree | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' } }, fontFamily: { sans: ['Inter','system-ui','-apple-system','sans-serif'] } } } };
    </script>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar" data-page-type="portal" data-active-page="family-tree">

    <div id="nav-placeholder"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 flex-1 w-full">
        <div class="mb-6 sm:mb-8">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900">Family Tree</h1>
                    <p class="text-gray-500 text-sm mt-1">Explore relationships across family members. Suggestions require admin approval.</p>
                </div>
                <div class="flex items-center gap-2">
                    <input id="searchInput" placeholder="Search members" class="px-3 py-2 rounded-lg border border-gray-200 focus:outline-none" />
                    <button id="refreshBtn" class="bg-brand-600 text-white px-3 py-2 rounded-lg">Refresh</button>
                    <button id="addRelationBtn" class="ml-2 inline-flex items-center gap-2 bg-white border border-gray-200 px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Add Relation</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div class="lg:col-span-2 bg-white rounded-2xl border border-gray-200 p-4">
                <div id="cy" class="w-full h-96 sm:h-[560px]" style="width:100%;"></div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-200 p-4">
                <div id="adminApprovalsWrap" class="mb-4 hidden">
                    <h3 class="font-semibold text-gray-800 mb-2">Pending Suggestions (Admin)</h3>
                    <div id="adminApprovalsList" class="space-y-2"></div>
                    <div class="border-t border-gray-100 my-3"></div>
                </div>
                <h3 class="font-semibold text-gray-800 mb-2">Members</h3>
                <div id="memberList" class="space-y-2 max-h-96 overflow-auto"></div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell/icons.js"></script>
    <script src="../js/components/pageShell/helpers.js"></script>
    <script src="../js/components/pageShell/nav.js"></script>
    <script src="../js/components/pageShell/dropdowns.js"></script>
    <script src="../js/components/pageShell/drawer.js"></script>
    <script src="../js/components/pageShell/profile-loader.js"></script>
    <script src="../js/components/pageShell/index.js"></script>
    <script src="../js/components/notifications.js"></script>
    <script src="../js/push.js"></script>
    <script src="../js/auth/shared.js"></script>
    <script src="https://unpkg.com/cytoscape@3.24.0/dist/cytoscape.min.js"></script>
    <script src="../js/components/treeViz.js"></script>
    <script src="../js/portal/familyTree.js"></script>
    <script src="../js/portal/treeEdit.js"></script>
    <script src="../js/sw-register.js"></script>
    <script>
        // initialize
        document.addEventListener('DOMContentLoaded', function(){
            if (window.loadFamilyTree) window.loadFamilyTree();
        });
    </script>

    <!-- Add Relation Modal -->
    <div id="relationModal" class="fixed inset-0 hidden items-center justify-center z-50">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="relative bg-white rounded-2xl w-full max-w-xl p-6 shadow-lg">
            <h3 class="text-lg font-semibold mb-3">Suggest a Relation</h3>
            <div class="space-y-3">
                <div>
                    <label class="text-xs text-gray-600">Person A</label>
                    <select id="personASelect" class="w-full mt-1 p-2 border rounded"></select>
                </div>
                <div>
                    <label class="text-xs text-gray-600">Person B</label>
                    <select id="personBSelect" class="w-full mt-1 p-2 border rounded"></select>
                </div>
                <div>
                    <label class="text-xs text-gray-600">Relation</label>
                    <select id="relationType" class="w-full mt-1 p-2 border rounded">
                        <option value="parent">Parent</option>
                        <option value="child">Child</option>
                        <option value="spouse">Spouse</option>
                        <option value="sibling">Sibling</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-600">Note (optional)</label>
                    <textarea id="relationNote" rows="3" class="w-full mt-1 p-2 border rounded"></textarea>
                </div>
            </div>
            <div class="mt-4 flex items-center justify-end gap-2">
                <button id="cancelRelation" class="px-3 py-2 rounded bg-gray-100">Cancel</button>
                <button id="submitRelation" class="px-3 py-2 rounded bg-brand-600 text-white">Submit Suggestion</button>
            </div>
        </div>
    </div>
</body>
</html>
