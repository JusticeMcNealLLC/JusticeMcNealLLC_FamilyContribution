<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JMLLC">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar" data-page-type="portal" data-active-page="profile">

    <div id="nav-placeholder"></div>

    <main class="max-w-xl mx-auto px-0 sm:px-4 flex-1 w-full">

        <!-- Cover Photo + Badge Highlights -->
        <div class="relative">
        <div id="coverSection" class="profile-cover relative w-full h-40 sm:h-52 bg-gradient-to-br from-brand-500 to-brand-700 sm:rounded-b-2xl overflow-hidden group">
            <img id="coverImage" class="w-full h-full object-cover hidden" alt="Cover photo">
            <div id="coverOverlay" class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
            <!-- New Post button (mobile only, own profile) -->
            <a href="feed.html?compose=1" id="profileNewPostBtn" class="hidden sm:hidden absolute top-0 left-0 z-10 profile-action-btn">
                <div class="w-8 h-8 bg-black/30 backdrop-blur-sm rounded-full flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </div>
            </a>
        </div>
        <!-- Badge Highlights (3 user-selected badges at bottom-center of banner) -->
        <div id="badgeHighlights" class="badge-highlights hidden"></div>
        </div>

        <!-- Banner/Cover is reward-only — no user picker -->

        <!-- Profile Header -->
        <div class="relative px-4 sm:px-0 -mt-12 mb-4">
            <!-- Avatar row: pic left, actions right -->
            <div class="flex items-end justify-between">
                <!-- Profile Picture -->
                <div class="relative flex-shrink-0">
                    <div id="profilePicWrap" class="w-20 h-20 sm:w-28 sm:h-28 rounded-full bg-brand-100 flex items-center justify-center overflow-hidden border-4 border-white shadow-md cursor-pointer group" role="button" tabindex="0">
                        <span id="profileInitials" class="text-2xl sm:text-3xl font-bold text-brand-600"></span>
                        <img id="profilePic" class="w-full h-full object-cover hidden" alt="Profile photo">
                        <!-- Camera overlay (own profile only) -->
                        <div id="picCameraOverlay" class="hidden absolute inset-0 bg-black/40 flex items-center justify-center rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-6 h-6 sm:w-7 sm:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                    </div>
                    <div id="profileBadgeOverlay" class="absolute -bottom-1 -right-1"></div>
                    <input type="file" id="profilePicInput" accept="image/*" class="hidden">
                </div>

                <!-- Placeholder for alignment -->
                <div class="pb-1"></div>
            </div>

            <!-- Name + Bio below avatar (full width, no truncation) -->
            <div class="mt-3">
                <h1 id="profileName" class="text-lg sm:text-2xl font-extrabold text-gray-900 break-words">
                    <span class="skeleton inline-block h-6 sm:h-7 w-40 rounded"></span>
                </h1>
                <!-- Leadership title badge (hidden until loaded) -->
                <div id="profileTitleBadge" class="hidden mt-1 mb-0.5"></div>
                <!-- RBAC role chips -->
                <div id="profileRoleChips" class="flex flex-wrap gap-1 mt-1"></div>
                <p id="profileBio" class="text-sm text-gray-500 mt-0.5 line-clamp-2"></p>

                <!-- Member Since (tappable → opens About) + Inline Stats -->
                <div class="mt-2">
                    <button id="memberSinceBtn" class="flex items-center gap-1 text-xs sm:text-sm text-gray-400 hover:text-brand-600 transition">
                        <span id="memberSinceText">Member since —</span>
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                    <div class="flex items-center gap-3 mt-1.5 text-sm sm:text-base text-gray-500">
                        <span><span class="font-bold text-gray-900" id="miniStatPosts">0</span> posts</span>
                        <span class="text-gray-300">·</span>
                        <span><span class="font-bold text-gray-900" id="miniStatBadges">0</span> unlocks</span>
                        <span class="text-gray-300">·</span>
                        <span><span class="font-bold text-gray-900" id="miniStatStreak">0</span> <span class="fire-animated">🔥</span></span>
                    </div>
                </div>

                <!-- Action Buttons Row (own profile: Edit, Share, Settings — other: Share) -->
                <div id="profileActionsRow" class="flex items-center gap-2 mt-3">
                    <button id="editProfileBtn" class="hidden flex-1 bg-surface-100 hover:bg-surface-200 text-gray-700 text-xs sm:text-sm font-semibold py-1.5 sm:py-2 rounded-xl transition border border-gray-200">
                        Edit Profile
                    </button>
                    <button id="shareProfileBtn" class="hidden flex-1 bg-surface-100 hover:bg-surface-200 text-gray-700 text-xs sm:text-sm font-semibold py-1.5 sm:py-2 rounded-xl transition border border-gray-200">
                        Share Profile
                    </button>
                    <a id="settingsGearBtn" href="settings.html" class="hidden w-9 h-9 flex items-center justify-center rounded-xl bg-surface-100 hover:bg-surface-200 border border-gray-200 transition flex-shrink-0">
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Hidden cosmetics containers (used by badges.js equip logic) -->
        <div id="badgesSection" class="hidden" aria-hidden="true">
            <div id="badgesGrid"></div>
            <div id="bannersGrid" class="hidden"><div id="earnedBannersGrid"></div></div>
            <button id="toggleBadgeCollectionBtn" class="hidden"></button>
            <div id="badgeCollectionPanel" class="hidden"><div id="badgeCollectionGrid"></div></div>
        </div>

        <!-- Profile Content Tabs -->
        <div class="px-4 sm:px-0 border-b border-gray-200 mb-0">
            <div class="flex">
                <button class="profile-tab active flex-1 py-3 text-sm font-semibold text-center border-b-2 transition" data-tab="posts">
                    <!-- Grid / Photos icon -->
                    <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                </button>
                <button class="profile-tab flex-1 py-3 text-sm font-semibold text-center border-b-2 transition" data-tab="feed">
                    <!-- Text/tweet icon -->
                    <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path></svg>
                </button>
                <button class="profile-tab flex-1 py-3 text-sm font-semibold text-center border-b-2 transition" data-tab="milestones">
                    <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                </button>
            </div>
        </div>

        <!-- Tab Content: Image Grid (photos only) -->
        <div id="tabPosts" class="profile-tab-content">
            <div id="postsGrid" class="grid grid-cols-3 gap-0.5">
                <!-- 3-column image grid -->
            </div>
            <div id="postsGridEmpty" class="hidden py-16 text-center">
                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-3">
                    <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <p class="text-sm text-gray-400 font-medium">No photos yet</p>
            </div>
        </div>

        <!-- Tab Content: Text Posts (Twitter-style) -->
        <div id="tabFeed" class="profile-tab-content hidden">
            <div id="profileFeedList" class="divide-y divide-gray-100">
                <!-- tweet-style posts rendered here -->
            </div>
            <div id="profileFeedEmpty" class="hidden py-16 text-center">
                <p class="text-sm text-gray-400 font-medium">No posts yet</p>
            </div>
        </div>

        <!-- Tab Content: Milestones & Badges -->
        <div id="tabMilestones" class="profile-tab-content hidden">
            <div class="px-4 sm:px-0 py-4 space-y-3" id="milestonesTimeline">
                <!-- rendered by JS -->
            </div>
            <div id="milestonesEmpty" class="hidden py-16 text-center">
                <p class="text-sm text-gray-400 font-medium">No milestones yet</p>
            </div>
        </div>

    </main>

    <!-- Edit Profile Modal -->
    <div id="editBioModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="editBioBackdrop"></div>
        <div class="relative flex items-center justify-center min-h-full p-4">
            <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl slide-up max-h-[85vh] overflow-y-auto">
                <h3 class="font-bold text-gray-900 mb-5">Edit Profile</h3>
                <div class="space-y-5">

                    <!-- Profile Photo Section -->
                    <div class="flex items-center gap-4">
                        <div id="editModalAvatar" class="w-16 h-16 rounded-full bg-brand-100 flex items-center justify-center overflow-hidden border-2 border-gray-200 flex-shrink-0 cursor-pointer relative group" role="button">
                            <span id="editModalInitials" class="text-xl font-bold text-brand-600"></span>
                            <img id="editModalPic" class="w-full h-full object-cover hidden" alt="">
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </div>
                        </div>
                        <div>
                            <button id="editModalChangePhotoBtn" class="text-sm font-semibold text-brand-600 hover:text-brand-700 transition">Change Photo</button>
                            <p class="text-xs text-gray-400 mt-0.5">JPG, PNG under 2MB</p>
                        </div>
                        <input type="file" id="editModalPicInput" accept="image/*" class="hidden">
                    </div>

                    <!-- Bio Section -->
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Bio / Tagline</label>
                        <textarea id="editBioInput" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-300 resize-none" rows="3" maxlength="200" placeholder="Tell the family about yourself..."></textarea>
                        <span id="bioCharCount" class="text-xs text-gray-400">0 / 200</span>
                    </div>

                    <!-- Badge Picker Section -->
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-2">Displayed Badge</label>
                        <div id="editModalBadgePicker" class="flex flex-wrap gap-2">
                            <!-- None option -->
                            <button data-badge="" class="edit-badge-option w-10 h-10 rounded-full border-2 border-gray-200 flex items-center justify-center text-xs text-gray-400 hover:border-gray-400 transition" title="No badge">
                                ✕
                            </button>
                            <!-- Earned badges injected by JS -->
                        </div>
                        <p class="text-xs text-gray-400 mt-1.5">Pick a badge to show on your avatar</p>
                    </div>

                    <!-- Badge Highlights Picker (select up to 3) -->
                    <div id="editHighlightSection" class="hidden">
                        <label class="block text-xs font-medium text-gray-500 mb-2">Badge Highlights <span class="text-gray-400 font-normal">(up to 3)</span></label>
                        <div id="editHighlightPicker" class="flex flex-wrap gap-2">
                            <!-- Earned badges injected by JS -->
                        </div>
                        <p class="text-xs text-gray-400 mt-1.5">Choose badges to showcase on your banner</p>
                    </div>

                    <!-- Banner Picker Section -->
                    <div id="editBannerSection" class="hidden">
                        <label class="block text-xs font-medium text-gray-500 mb-2">Profile Banner</label>
                        <div id="editBannerPreview" class="w-full h-20 rounded-xl bg-gradient-to-r from-brand-600 to-purple-600 mb-2 overflow-hidden">
                            <img id="editBannerPreviewImg" class="w-full h-full object-cover hidden" alt="">
                        </div>
                        <div id="editModalBannerPicker" class="grid grid-cols-3 gap-2">
                            <!-- Earned banners injected by JS -->
                        </div>
                        <p class="text-xs text-gray-400 mt-1.5">Choose from your earned banners</p>
                    </div>

                </div>
                <div class="flex gap-3 mt-5">
                    <button id="editBioCancelBtn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-xl transition text-sm">Cancel</button>
                    <button id="editBioSaveBtn" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl transition text-sm">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Share Profile / QR Code Modal -->
    <div id="shareModal" class="fixed inset-0 z-[200] hidden">
        <div class="absolute inset-0 bg-black/60" id="shareModalBackdrop"></div>
        <div class="relative flex items-end sm:items-center justify-center h-full sm:p-4">
            <div class="bg-white w-full sm:max-w-sm sm:rounded-2xl rounded-t-3xl shadow-2xl slide-up overflow-y-auto" style="max-height:85vh;">
                <div class="flex items-center justify-between px-5 pt-5 pb-3">
                    <h3 class="font-bold text-gray-900 text-base">Share Profile</h3>
                    <button id="shareModalCloseBtn" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <!-- QR Code -->
                <div class="flex flex-col items-center px-5 pb-4">
                    <div id="qrCodeContainer" class="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm mb-4">
                        <canvas id="qrCodeCanvas" width="200" height="200"></canvas>
                    </div>
                    <p id="shareProfileName" class="text-sm font-semibold text-gray-900 mb-1"></p>
                    <p id="shareProfileUrl" class="text-xs text-gray-400 truncate max-w-full mb-4"></p>
                </div>
                <!-- Actions -->
                <div class="px-5 pb-6 space-y-2">
                    <button id="copyProfileLinkBtn" class="w-full flex items-center justify-center gap-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl transition text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                        Copy Link
                    </button>
                    <button id="nativeShareBtn" class="hidden w-full flex items-center justify-center gap-2 bg-surface-100 hover:bg-surface-200 text-gray-700 font-semibold py-2.5 rounded-xl transition text-sm border border-gray-200">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                        Share
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- About Modal (opened from "Member since" tap) -->
    <div id="aboutModal" class="fixed inset-0 z-[200] hidden">
        <div class="absolute inset-0 bg-black/60" id="aboutModalBackdrop"></div>
        <div class="relative flex items-end sm:items-center justify-center h-full sm:p-4">
            <div class="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-3xl shadow-2xl slide-up overflow-y-auto" style="max-height:85vh;">
                <!-- Header -->
                <div class="sticky top-0 bg-white z-10 flex items-center justify-between px-5 pt-5 pb-2 border-b border-gray-100">
                    <div class="w-8"></div>
                    <h3 id="aboutModalTitle" class="font-bold text-gray-900 text-base">About</h3>
                    <button id="aboutModalCloseBtn" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>

                <!-- Profile pic + date joined -->
                <div class="flex flex-col items-center px-5 pb-5">
                    <div id="aboutModalPicWrap" class="w-24 h-24 rounded-full bg-brand-100 flex items-center justify-center overflow-hidden border-4 border-white shadow-lg mb-3">
                        <span id="aboutModalInitials" class="text-3xl font-bold text-brand-600"></span>
                        <img id="aboutModalImg" class="w-full h-full object-cover hidden" alt="">
                    </div>
                    <p id="aboutModalDate" class="text-sm text-gray-400">Joined —</p>
                </div>

                <!-- Badge Unlocks Carousel (3 rows) -->
                <div id="aboutBadgesSection" class="px-5 pb-5 hidden">
                    <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Badge Unlocks</h4>
                    <div class="overflow-x-auto no-scrollbar -mx-1 px-1">
                        <div id="aboutBadgesGrid" class="flex flex-wrap gap-2">
                            <!-- badges rendered by JS -->
                        </div>
                    </div>
                </div>

                <!-- Banner Unlocks Carousel (2 rows) -->
                <div id="aboutBannersSection" class="px-5 pb-8 hidden">
                    <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Banner Unlocks</h4>
                    <div class="overflow-x-auto no-scrollbar -mx-1 px-1">
                        <div id="aboutBannersGrid" class="grid grid-cols-2 gap-3">
                            <!-- banners rendered by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <div id="tabs-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell/icons.js"></script>
