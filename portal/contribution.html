<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Change Contribution | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../assets/icons/icon-192.svg">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar" data-page-type="portal" data-active-page="contribution">

    <div id="nav-placeholder"></div>

    <main class="max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-8 flex-1 w-full">

        <a href="index.html" class="inline-flex items-center gap-1 text-gray-500 hover:text-brand-600 text-sm mb-5 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Back to Dashboard
        </a>

        <div class="bg-white rounded-2xl border border-gray-200/80 p-5 sm:p-8 fade-in">
            <h1 class="text-xl sm:text-2xl font-extrabold text-gray-900 mb-6 tracking-tight">Change Your Contribution</h1>

            <!-- Current Info -->
            <div id="currentInfo" class="bg-surface-50 rounded-xl p-4 mb-6 border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm text-gray-500">Current amount</span>
                    <span class="text-sm font-bold text-gray-900" id="currentAmountDisplay">
                        <span class="skeleton inline-block h-4 w-20 rounded"></span>
                    </span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-500">Next bill date</span>
                    <span class="text-sm font-bold text-gray-900" id="nextBillDateDisplay">
                        <span class="skeleton inline-block h-4 w-24 rounded"></span>
                    </span>
                </div>
            </div>

            <!-- Amount Form -->
            <form id="contributionForm" class="space-y-5">
                <div>
                    <label for="newAmount" class="block text-sm font-medium text-gray-700 mb-2">
                        New Monthly Amount
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-semibold text-lg">$</span>
                        <input 
                            type="number" 
                            id="newAmount" 
                            name="newAmount" 
                            min="30" 
                            max="250" 
                            step="1"
                            required 
                            placeholder="50"
                            class="w-full pl-9 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-lg font-semibold"
                        >
                    </div>
                    <p class="text-xs text-gray-400 mt-2">Minimum $30, maximum $250 (whole dollars only)</p>
                </div>

                <div id="formError" class="text-red-600 text-sm hidden"></div>

                <!-- Confirmation Preview -->
                <div id="confirmationPreview" class="hidden bg-emerald-50 border border-emerald-200 rounded-xl p-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-emerald-100 rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <p class="text-sm text-emerald-800">
                            New amount of <strong id="previewAmount">$--</strong>/month starts <strong id="previewDate">--</strong>
                        </p>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button type="submit" id="saveBtn" class="flex-1 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold py-3.5 px-4 rounded-xl transition text-sm">
                        Save Changes
                    </button>
                    <a href="index.html" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3.5 px-4 rounded-xl transition text-center text-sm">
                        Cancel
                    </a>
                </div>
            </form>

            <!-- First Time Setup -->
            <div id="firstTimeSetup" class="hidden">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-brand-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-gray-900 mb-1">Start Your Contribution</h2>
                    <p class="text-gray-500 text-sm">Choose your monthly amount to get started.</p>
                </div>
                
                <form id="setupForm" class="space-y-5">
                    <div>
                        <label for="setupAmount" class="block text-sm font-medium text-gray-700 mb-2">Monthly Amount</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-semibold text-lg">$</span>
                            <input 
                                type="number" 
                                id="setupAmount" 
                                name="setupAmount" 
                                min="30" 
                                max="250" 
                                step="1"
                                required 
                                placeholder="50"
                                class="w-full pl-9 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-lg font-semibold"
                            >
                        </div>
                        <p class="text-xs text-gray-400 mt-2">Minimum $30, maximum $250 (whole dollars only)</p>
                    </div>

                    <div id="setupError" class="text-red-600 text-sm hidden"></div>

                    <button type="submit" id="setupBtn" class="w-full bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold py-3.5 px-4 rounded-xl transition text-sm">
                        Start Subscription
                    </button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="tabs-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell/icons.js"></script>
    <script src="../js/components/pageShell/helpers.js"></script>
    <script src="../js/components/pageShell/nav.js"></script>
    <script src="../js/components/pageShell/dropdowns.js"></script>
    <script src="../js/components/pageShell/drawer.js"></script>
    <script src="../js/components/pageShell/profile-loader.js"></script>
    <script src="../js/components/pageShell/index.js"></script>
    <script src="../js/components/notifications.js"></script>
    <script src="../js/push.js"></script>
    <script src="../js/auth/shared.js"></script>
    <script src="../js/portal/portal.js"></script>
    <script src="../js/portal/contribution.js"></script>
    <script src="../js/sw-register.js"></script>
</body>
</html>
