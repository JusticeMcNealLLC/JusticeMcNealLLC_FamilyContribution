<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Transaction History | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../assets/icons/icon-192.svg">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar" data-page-type="portal" data-active-page="history">

    <div id="nav-placeholder"></div>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-8 flex-1 w-full">

        <a href="index.html" class="inline-flex items-center gap-1 text-gray-500 hover:text-brand-600 text-sm mb-5 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Back to Dashboard
        </a>

        <div class="mb-6">
            <h1 class="text-xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">Transaction History</h1>
            <p class="text-gray-500 mt-1 text-sm">All your contributions — subscriptions and deposits combined</p>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-white rounded-2xl border border-gray-200/80 p-4 sm:p-5">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Total Contributed</div>
                <div class="text-lg sm:text-2xl font-extrabold text-emerald-600 stat-number" id="historyTotal">
                    <span class="skeleton inline-block h-7 w-20 rounded"></span>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-200/80 p-4 sm:p-5">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Payments</div>
                <div class="text-lg sm:text-2xl font-extrabold text-gray-900 stat-number" id="paymentCount">
                    <span class="skeleton inline-block h-7 w-10 rounded"></span>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-200/80 p-4 sm:p-5">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Deposits</div>
                <div class="text-lg sm:text-2xl font-extrabold text-blue-600 stat-number" id="depositCount">
                    <span class="skeleton inline-block h-7 w-10 rounded"></span>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-3 mb-4">
            <select id="sourceFilter" class="bg-white border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none">
                <option value="all">All Sources</option>
                <option value="stripe_monthly">Monthly (Stripe)</option>
                <option value="stripe_onetime">One-time (Stripe)</option>
                <option value="deposit">Manual Deposits</option>
            </select>
            <select id="periodFilter" class="bg-white border border-gray-200 rounded-xl px-3 py-2.5 text-sm text-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none">
                <option value="all">All Time</option>
                <option value="12">Last 12 Months</option>
                <option value="6">Last 6 Months</option>
                <option value="3">Last 3 Months</option>
            </select>
        </div>

        <!-- Transactions — Mobile: Cards / Desktop: Table -->
        <div class="bg-white rounded-2xl border border-gray-200/80 overflow-hidden" id="transactionsContainer">
            <!-- Desktop Table -->
            <table class="w-full hidden sm:table" id="transactionsTable">
                <thead class="bg-surface-50 border-b border-gray-200/80">
                    <tr>
                        <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Date</th>
                        <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Source</th>
                        <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Amount</th>
                        <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</th>
                        <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Details</th>
                    </tr>
                </thead>
                <tbody id="transactionsBody" class="divide-y divide-gray-100">
                    <tr>
                        <td colspan="5" class="px-5 py-8 text-center text-gray-400 text-sm">Loading...</td>
                    </tr>
                </tbody>
            </table>

            <!-- Mobile Card List -->
            <div id="transactionsMobileList" class="sm:hidden divide-y divide-gray-100">
                <div class="px-4 py-6 text-center text-gray-400 text-sm">Loading...</div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden fade-in">
            <div class="bg-white rounded-2xl border border-gray-200 p-8 sm:p-12 text-center">
                <div class="w-16 h-16 bg-brand-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">No payments yet</h3>
                <p class="text-gray-500 text-sm mb-6">Your payment history will appear here once you start contributing.</p>
                <a href="contribution.html" class="inline-flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-5 rounded-xl transition text-sm">
                    Start Contributing
                </a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="tabs-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell/icons.js"></script>
    <script src="../js/components/pageShell/helpers.js"></script>
    <script src="../js/components/pageShell/nav.js"></script>
    <script src="../js/components/pageShell/dropdowns.js"></script>
    <script src="../js/components/pageShell/drawer.js"></script>
    <script src="../js/components/pageShell/profile-loader.js"></script>
    <script src="../js/components/pageShell/index.js"></script>
    <script src="../js/components/notifications.js"></script>
    <script src="../js/push.js"></script>
    <script src="../js/auth/shared.js"></script>
    <script src="../js/portal/portal.js"></script>
    <script src="../js/portal/history.js"></script>
    <script src="../js/sw-register.js"></script>
</body>
</html>
