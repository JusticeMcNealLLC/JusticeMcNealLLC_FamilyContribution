<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quest Management | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../assets/icons/icon-192.svg">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar" data-page-type="admin" data-active-page="hub">

    <div id="nav-placeholder"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 flex-1 w-full">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6 sm:mb-8">
            <div>
                <a href="index.html" class="inline-flex items-center gap-1 text-gray-500 hover:text-brand-600 text-sm mb-2 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back to Hub
                </a>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">Quest Management</h1>
                <p class="text-gray-500 mt-1 text-sm">Create quests, review submissions, and manage Credit Points</p>
            </div>
            <button id="createQuestBtn" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 px-5 rounded-xl transition text-sm hidden sm:inline-flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Quest
            </button>
        </div>

        <!-- Mobile FAB -->
        <button id="createQuestBtnMobile" class="sm:hidden fixed bottom-24 right-4 z-30 w-14 h-14 bg-brand-600 hover:bg-brand-700 text-white rounded-2xl shadow-lg flex items-center justify-center transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </button>

        <!-- Stats Row -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 mb-6" id="adminQuestStats">
            <div class="bg-white rounded-2xl p-4 sm:p-5 border border-gray-200/80">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Total Quests</div>
                <div class="text-2xl font-extrabold text-gray-900" id="statTotalQuests">-</div>
            </div>
            <div class="bg-white rounded-2xl p-4 sm:p-5 border border-gray-200/80">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Pending Review</div>
                <div class="text-2xl font-extrabold text-amber-600" id="statPendingReview">-</div>
            </div>
            <div class="bg-white rounded-2xl p-4 sm:p-5 border border-gray-200/80">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Completions</div>
                <div class="text-2xl font-extrabold text-emerald-600" id="statCompletions">-</div>
            </div>
            <div class="bg-white rounded-2xl p-4 sm:p-5 border border-gray-200/80">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">CP Awarded</div>
                <div class="text-2xl font-extrabold text-brand-600" id="statCPAwarded">-</div>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="flex gap-2 mb-5 overflow-x-auto pb-1 scrollbar-hide" id="adminTabs">
            <button data-tab="submissions" class="admin-tab-btn px-4 py-2 rounded-xl text-sm font-medium bg-brand-600 text-white">Pending Submissions</button>
            <button data-tab="quests" class="admin-tab-btn px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-600 border border-gray-200">All Quests</button>
            <button data-tab="members" class="admin-tab-btn px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-600 border border-gray-200">Member Status</button>
        </div>

        <!-- Pending Submissions Panel -->
        <div id="submissionsPanel" class="space-y-3"></div>

        <!-- All Quests Panel -->
        <div id="questsPanel" class="hidden space-y-3"></div>

        <!-- Member Status Panel -->
        <div id="membersPanel" class="hidden space-y-3"></div>
    </main>

    <!-- Create/Edit Quest Modal -->
    <div id="questFormModal" class="hidden"></div>

    <!-- Submission Review Modal -->
    <div id="reviewModal" class="hidden"></div>

    <div id="footer-placeholder"></div>
    <div id="tabs-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell/icons.js"></script>
    <script src="../js/components/pageShell/helpers.js"></script>
    <script src="../js/components/pageShell/nav.js"></script>
    <script src="../js/components/pageShell/dropdowns.js"></script>
    <script src="../js/components/pageShell/drawer.js"></script>
    <script src="../js/components/pageShell/profile-loader.js"></script>
    <script src="../js/components/pageShell/index.js"></script>
    <script src="../js/auth/shared.js"></script>
    <script src="../js/portal/quests/config.js"></script>
    <script src="../js/admin/quests.js"></script>
    <script src="../js/sw-register.js"></script>
</body>
</html>
