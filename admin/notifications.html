<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Notifications | Admin | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../assets/icons/icon-192.svg">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar" data-page-type="admin" data-active-page="notifications">

    <div id="nav-placeholder"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 flex-1 w-full">

        <!-- Header -->
        <div class="flex items-center gap-3 mb-8">
            <a href="index.html" class="w-9 h-9 flex items-center justify-center rounded-xl bg-white border border-gray-200 hover:bg-gray-50 transition">
                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <div>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">Notifications</h1>
                <p class="text-gray-500 mt-0.5 text-sm">Send test notifications & view push subscribers</p>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4 mb-8">
            <div class="bg-white rounded-2xl p-4 sm:p-5 border border-gray-200/80">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Push Subscribers</div>
                <div class="text-2xl sm:text-3xl font-extrabold text-brand-600" id="statSubscribers"><div class="skeleton h-8 w-10 rounded-lg"></div></div>
            </div>
            <div class="bg-white rounded-2xl p-4 sm:p-5 border border-gray-200/80">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Total Sent</div>
                <div class="text-2xl sm:text-3xl font-extrabold text-gray-900" id="statTotalSent"><div class="skeleton h-8 w-10 rounded-lg"></div></div>
            </div>
            <div class="bg-white rounded-2xl p-4 sm:p-5 border border-gray-200/80 col-span-2 sm:col-span-1">
                <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Unread</div>
                <div class="text-2xl sm:text-3xl font-extrabold text-amber-600" id="statUnread"><div class="skeleton h-8 w-10 rounded-lg"></div></div>
            </div>
        </div>

        <!-- Send Test Notification -->
        <div class="bg-white rounded-2xl border border-gray-200/80 shadow-sm p-6 mb-8">
            <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                <span class="text-xl">🔔</span> Send Test Notification
            </h2>

            <div class="space-y-4">
                <!-- Recipient -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Recipient</label>
                    <select id="recipientSelect" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm bg-white">
                        <option value="">Loading members...</option>
                    </select>
                </div>

                <!-- Type -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Notification Type</label>
                    <select id="typeSelect" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm bg-white">
                        <option value="system">🔧 System</option>
                        <option value="welcome">👋 Welcome</option>
                        <option value="like">❤️ Like</option>
                        <option value="comment">💬 Comment</option>
                        <option value="mention">📢 Mention</option>
                        <option value="follow">🤝 Follow</option>
                        <option value="quest">⭐ Quest</option>
                        <option value="badge">🏆 Badge</option>
                        <option value="milestone">🎯 Milestone</option>
                        <option value="deposit">💵 Deposit</option>
                        <option value="payout">💸 Payout</option>
                        <option value="event">📅 Event</option>
                    </select>
                </div>

                <!-- Message -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Message</label>
                    <textarea id="messageInput" rows="3" placeholder="Enter the notification message..." class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm resize-none"></textarea>
                </div>

                <!-- Send Both Toggle -->
                <div class="flex items-center gap-3">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="sendPushToggle" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-600"></div>
                    </label>
                    <span class="text-sm text-gray-700">Also trigger push notification (if subscribed)</span>
                </div>

                <div id="sendError" class="text-red-600 text-sm hidden"></div>
                <div id="sendSuccess" class="text-emerald-600 text-sm hidden"></div>

                <button id="sendBtn" class="w-full sm:w-auto bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold py-3 px-6 rounded-xl transition text-sm shadow-sm shadow-brand-200 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    Send Notification
                </button>
            </div>
        </div>

        <!-- Push Subscribers -->
        <div class="bg-white rounded-2xl border border-gray-200/80 shadow-sm p-6 mb-8">
            <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                <span class="text-xl">📲</span> Push Subscribers
            </h2>
            <div id="subscribersList" class="space-y-2">
                <div class="text-sm text-gray-400 py-8 text-center">Loading...</div>
            </div>
        </div>

        <!-- Recent Notifications Log -->
        <div class="bg-white rounded-2xl border border-gray-200/80 shadow-sm p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                    <span class="text-xl">📋</span> Recent Notifications
                </h2>
                <button id="refreshLogBtn" class="text-sm text-brand-600 hover:text-brand-700 font-medium transition flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Refresh
                </button>
            </div>
            <div id="notificationsLog" class="space-y-2">
                <div class="text-sm text-gray-400 py-8 text-center">Loading...</div>
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>
    <div id="tabs-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell/icons.js"></script>
    <script src="../js/components/pageShell/helpers.js"></script>
    <script src="../js/components/pageShell/nav.js"></script>
    <script src="../js/components/pageShell/dropdowns.js"></script>
    <script src="../js/components/pageShell/drawer.js"></script>
    <script src="../js/components/pageShell/profile-loader.js"></script>
    <script src="../js/components/pageShell/index.js"></script>
    <script src="../js/auth/shared.js"></script>
    <script src="../js/admin/notifications.js"></script>
    <script src="../js/sw-register.js"></script>
</body>
</html>
