<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Members | Admin | Justice McNeal LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
                        },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JMLLC">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
</head>
<body class="min-h-screen bg-surface-50 font-sans antialiased flex flex-col has-bottom-bar"
      data-page-type="admin" data-active-page="members">

    <div id="nav-placeholder"></div>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 flex-1 w-full">

        <!-- â”€â”€ Page Header â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-6">
            <div>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">Members</h1>
                <p class="text-gray-500 mt-1 text-sm">Family lifecycle management</p>
            </div>
            <button id="inviteBtn" type="button"
                class="inline-flex items-center justify-center gap-2 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold py-2.5 px-5 rounded-xl text-sm shadow-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Invite Member
            </button>
        </div>

        <!-- â”€â”€ Stats Row (5 tiles) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-3 sm:gap-4 mb-6">
            <div class="col-span-2 lg:col-span-2 bg-gradient-to-br from-brand-600 to-brand-700 rounded-2xl p-5 text-white">
                <div class="text-[10px] font-bold uppercase tracking-widest text-brand-100">This Month</div>
                <div class="text-3xl sm:text-4xl font-extrabold tracking-tight mt-2" id="statThisMonth">â€”</div>
                <div class="text-brand-200 text-xs mt-1">collected so far</div>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-gray-200/80">
                <div class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Active</div>
                <div class="text-2xl font-extrabold text-gray-900 tracking-tight mt-1" id="statActiveCount">â€”</div>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-gray-200/80">
                <div class="text-[10px] font-bold uppercase tracking-widest text-gray-500">All Time</div>
                <div class="text-2xl font-extrabold text-gray-900 tracking-tight mt-1" id="statAllTime">â€”</div>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-gray-200/80">
                <div class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Total Invited</div>
                <div class="text-2xl font-extrabold text-gray-900 tracking-tight mt-1" id="statTotalInvited">â€”</div>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-amber-200">
                <div class="text-[10px] font-bold uppercase tracking-widest text-amber-600">Needs Attention</div>
                <div class="text-2xl font-extrabold text-amber-700 tracking-tight mt-1" id="statNeedsAttention">â€”</div>
            </div>
        </div>

        <!-- â”€â”€ Status Filter Tabs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div id="membersTabs" class="flex gap-1 mb-4 overflow-x-auto -mx-1 px-1 pb-1"></div>

        <!-- â”€â”€ Member List â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div id="membersListContainer" class="grid gap-3"></div>

    </main>

    <!-- ── Invite Modal (Phase 1B) ─────────────────────────────────────────── -->
    <div id="inviteModal" class="fixed inset-0 z-50 hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="inviteModalTitle">
        <div id="inviteModalBackdrop" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
        <div class="absolute inset-0 flex items-end sm:items-center justify-center p-0 sm:p-4">
            <div class="relative w-full sm:max-w-md bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl overflow-hidden">
                <div class="px-6 pt-6 pb-2 flex items-start justify-between">
                    <div>
                        <h2 id="inviteModalTitle" class="text-lg font-bold text-gray-900">Invite a Member</h2>
                        <p class="text-sm text-gray-500 mt-0.5">They'll receive an email with a setup link.</p>
                    </div>
                    <button id="inviteModalClose" type="button" class="-mr-2 -mt-2 p-2 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100" aria-label="Close">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <form id="inviteForm" class="px-6 pb-6 pt-4 space-y-4" novalidate>
                    <div>
                        <label for="inviteEmail" class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Email Address</label>
                        <input id="inviteEmail" name="email" type="email" autocomplete="email" required
                            placeholder="name@example.com"
                            class="w-full px-4 py-2.5 rounded-xl border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        <p id="inviteError" class="hidden mt-2 text-sm text-red-600" role="alert"></p>
                    </div>

                    <div id="inviteSuccess" class="hidden bg-emerald-50 border border-emerald-200 rounded-xl p-3 flex items-start gap-2">
                        <svg class="w-5 h-5 text-emerald-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <div class="text-sm text-emerald-800">
                            <div class="font-semibold">Invitation sent!</div>
                            <div class="text-emerald-700 mt-0.5">They'll appear in the list shortly.</div>
                        </div>
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button type="button" id="inviteCancel" class="flex-1 py-2.5 px-4 rounded-xl border border-gray-300 text-gray-700 font-semibold text-sm hover:bg-gray-50">Cancel</button>
                        <button type="submit" id="inviteSubmit" class="flex-1 py-2.5 px-4 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-semibold text-sm disabled:opacity-60 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">
                            <span id="inviteSubmitLabel">Send Invite</span>
                            <svg id="inviteSubmitSpinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <div id="tabs-placeholder"></div>

    <!-- ── Member Profile Sheet (Phase 2) ───────────────────────────────────── -->
    <div id="memberSheet" class="fixed inset-0 z-50 hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="memberSheetHeader">
        <div id="memberSheetBackdrop" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
        <div class="absolute inset-x-0 bottom-0 sm:inset-y-0 sm:right-0 sm:left-auto sm:w-full sm:max-w-xl flex">
            <div class="relative w-full bg-surface-50 sm:bg-surface-50 rounded-t-3xl sm:rounded-none shadow-2xl flex flex-col max-h-[90vh] sm:max-h-none sm:h-full">
                <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-200 bg-white sticky top-0 z-10">
                    <div id="memberSheetHeader" class="flex items-center gap-3 flex-1 min-w-0"></div>
                    <button id="memberSheetClose" type="button" class="p-2 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100 flex-shrink-0" aria-label="Close">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="memberSheetTabs" class="flex gap-1 px-3 border-b border-gray-200 bg-white sticky top-[73px] z-10 overflow-x-auto"></div>
                <div id="memberSheetContent" class="flex-1 overflow-y-auto p-4 sm:p-5"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/components/pageShell/icons.js"></script>
    <script src="../js/components/pageShell/helpers.js"></script>
    <script src="../js/components/pageShell/nav.js"></script>
    <script src="../js/components/pageShell/dropdowns.js"></script>
    <script src="../js/components/pageShell/drawer.js"></script>
    <script src="../js/components/pageShell/profile-loader.js"></script>
    <script src="../js/components/pageShell/index.js"></script>
    <script src="../js/auth/shared.js"></script>
    <script src="../js/admin/members/members-status.js"></script>
    <script src="../js/admin/members/members-cards.js"></script>
    <script src="../js/admin/members/members-invite.js"></script>
    <script src="../js/admin/members/members-modal.js"></script>
    <script src="../js/admin/members/index.js"></script>
    <script src="../js/sw-register.js"></script>
</body>
</html>
